  <div id="pdfModal">
    <div class="pdf-modal-content">
      <button class="pdf-close" onclick="closePDF()">✕</button>
      <iframe id="pdf-frame" src=""></iframe>
    </div>
  </div>

<script>
function openPDF(url) {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = url;
  modal.classList.add('open');
}

function closePDF() {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = "";
  modal.classList.remove('open');
}
</script>

<script>
function shareArticle(title, url, network = null) {
  if (network === "facebook") {
    const fbUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url);
    window.open(fbUrl, "_blank", "noopener");
    return;
  }

  if (network === "twitter") {
    const twUrl = "https://twitter.com/intent/tweet?text="
                  + encodeURIComponent(title)
                  + "&url=" + encodeURIComponent(url);
    window.open(twUrl, "_blank", "noopener");
    return;
  }

  if (network === "whatsapp") {
    const waUrl = "https://api.whatsapp.com/send?text="
                  + encodeURIComponent(title + " " + url);
    window.open(waUrl, "_blank", "noopener");
    return;
  }

  if (network === "email") {
    const mailUrl = "mailto:?subject="
                    + encodeURIComponent(title)
                    + "&body=" + encodeURIComponent(url);
    window.location.href = mailUrl;
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: title,
      url: url
    });
    return;
  }

  navigator.clipboard.writeText(url);
  alert("Lien copié !");
}
</script>

<button id="backToTop" title="Remonter le terrier">🐇↟</button>

<script>
  const btn = document.getElementById("backToTop");

  window.onscroll = function() {
    if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  };

  btn.onclick = function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
</script>

<!-- MODE FANTÔME : bouton affiché uniquement sur /memoire -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  if (window.location.pathname.includes("memoire")) {

    const zone = document.querySelector(".contenu-page");

    const bouton = document.createElement("button");
    bouton.id = "toggleFantome";
    bouton.style.marginBottom = "1em";

    function majBouton() {
      if (localStorage.getItem("lapinsights_ignore") === "true") {
        bouton.textContent = "👻 Mode fantôme : ACTIVÉ";
        bouton.style.background = "#333";
        bouton.style.color = "white";
      } else {
        bouton.textContent = "👻 Activer le mode fantôme";
        bouton.style.background = "";
        bouton.style.color = "";
      }
    }

    bouton.onclick = function() {
      if (localStorage.getItem("lapinsights_ignore") === "true") {
        localStorage.removeItem("lapinsights_ignore");
      } else {
        localStorage.setItem("lapinsights_ignore", "true");
      }
      majBouton();
    };

    majBouton();
    zone.insertBefore(bouton, zone.children[2]); // juste sous les deux premiers boutons
  }
});
</script>

<!-- JOURNAL PRIVÉ AVEC MODE FANTÔME -->
<script>
(function() {

  // MODE FANTÔME : ignorer les visites du propriétaire
  if (localStorage.getItem("lapinsights_ignore") === "true") {
    console.log("Visite ignorée (mode fantôme activé)");
    return;
  }

  // Charger le journal existant ou créer un nouveau
  let journal = JSON.parse(localStorage.getItem("lapinsights_journal") || "[]");

  // Générer un identifiant anonyme pour le visiteur (une seule fois)
  if (!localStorage.getItem("lapinsights_id")) {
    localStorage.setItem("lapinsights_id", "visiteur-" + Math.random().toString(36).substring(2, 10));
  }

  let visiteurID = localStorage.getItem("lapinsights_id");

  // Début de la visite (pour calculer la durée)
  let debut = Date.now();

  // Quand la personne quitte la page
  window.addEventListener("beforeunload", function() {

    let duree = Math.round((Date.now() - debut) / 1000); // en secondes

    let entree = {
      visiteur: visiteurID,
      page: window.location.pathname,
      date: new Date().toISOString(),
      duree: duree,
      navigateur: navigator.userAgent,
      langue: navigator.language,
      resolution: window.innerWidth + "x" + window.innerHeight,
      referer: document.referrer || "direct"
    };

    journal.push(entree);

    // Sauvegarder
    localStorage.setItem("lapinsights_journal", JSON.stringify(journal));

    // Affichage privé dans la console
    console.log("Journal privé Lapinsights :", journal);
  });

})();
</script>
